<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#faf8f5"/>
  <rect x="10" y="10" width="580" height="380" rx="15" fill="none" stroke="#c4a882" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Laptop -->
  <rect x="150" y="100" width="200" height="140" rx="10" fill="#fff9f0" stroke="#8b7355" stroke-width="2"/>
  <rect x="160" y="110" width="180" height="110" fill="#ffe4c4" stroke="#c4a882" stroke-width="1"/>
  <rect x="140" y="240" width="220" height="15" rx="5" fill="#e8dcc8" stroke="#8b7355" stroke-width="2"/>
  <rect x="130" y="255" width="240" height="10" rx="3" fill="#d4c4a8" stroke="#8b7355" stroke-width="2"/>

  <!-- Shopping cart icon on screen -->
  <path d="M200 140 L210 140 L225 190 L280 190 L290 150 L220 150" fill="none" stroke="#8b6b4a" stroke-width="3"/>
  <circle cx="230" cy="205" r="8" fill="none" stroke="#8b6b4a" stroke-width="3"/>
  <circle cx="275" cy="205" r="8" fill="none" stroke="#8b6b4a" stroke-width="3"/>

  <!-- Delivery boxes -->
  <rect x="400" y="180" width="80" height="80" rx="5" fill="#ffe4c4" stroke="#8b7355" stroke-width="2"/>
  <line x1="400" y1="200" x2="480" y2="200" stroke="#c4a882" stroke-width="2"/>
  <line x1="440" y1="180" x2="440" y2="260" stroke="#c4a882" stroke-width="2"/>
  <path d="M400 195 Q440 185 480 195" fill="none" stroke="#c4a882" stroke-width="2"/>

  <rect x="430" y="220" width="60" height="60" rx="5" fill="#fff5e6" stroke="#8b7355" stroke-width="2"/>
  <line x1="430" y1="235" x2="490" y2="235" stroke="#c4a882" stroke-width="2"/>

  <!-- Growth chart -->
  <path d="M80 280 L120 260 L180 240 L240 200 L300 180" fill="none" stroke="#8b6b4a" stroke-width="3" stroke-dasharray="5,3"/>
  <circle cx="80" cy="280" r="5" fill="#8b6b4a"/>
  <circle cx="180" cy="240" r="5" fill="#8b6b4a"/>
  <circle cx="300" cy="180" r="5" fill="#8b6b4a"/>

  <!-- Text -->
  <text x="300" y="360" text-anchor="middle" fill="#5c4a3a" font-family="serif" font-size="24">🛒 电商运营</text>
</svg>