<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#faf8f5"/>
  <rect x="10" y="10" width="580" height="380" rx="15" fill="none" stroke="#c4a882" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Storefront/shop sign -->
  <rect x="200" y="80" width="200" height="180" fill="#fff9f0" stroke="#8b7355" stroke-width="3"/>
  <rect x="220" y="60" width="160" height="40" rx="5" fill="#ffe4c4" stroke="#c4a882" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" fill="#5c4a3a" font-family="serif" font-size="20">E-SHOP</text>
  <rect x="260" y="150" width="80" height="100" fill="#e8dcc8" stroke="#8b7355" stroke-width="2"/>
  <rect x="240" y="130" width="40" height="30" fill="#87CEEB" stroke="#8b7355" stroke-width="2"/>
  <rect x="320" y="130" width="40" height="30" fill="#87CEEB" stroke="#8b7355" stroke-width="2"/>

  <!-- Shopping tags -->
  <circle cx="100" cy="150" r="25" fill="#ffe4c4" stroke="#c4a882" stroke-width="2"/>
  <text x="100" y="158" text-anchor="middle" font-size="30">🏷️</text>

  <circle cx="500" cy="150" r="25" fill="#ffe4c4" stroke="#c4a882" stroke-width="2"/>
  <text x="500" y="158" text-anchor="middle" font-size="30">🏷️</text>

  <!-- Price tag -->
  <path d="M450 250 L520 250 L540 280 L520 310 L450 310 Z" fill="#ffe4c4" stroke="#8b7355" stroke-width="2"/>
  <circle cx="470" cy="280" r="10" fill="#fff9f0" stroke="#8b7355" stroke-width="2"/>
  <text x="485" y="285" fill="#5c4a3a" font-size="14">¥99</text>

  <!-- Discount label -->
  <rect x="80" y="240" width="80" height="35" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="120" y="265" text-anchor="middle" fill="#fff" font-family="serif" font-size="16">限时折扣</text>

  <!-- Text -->
  <text x="300" y="360" text-anchor="middle" fill="#5c4a3a" font-family="serif" font-size="24">🛒 电商运营</text>
</svg>