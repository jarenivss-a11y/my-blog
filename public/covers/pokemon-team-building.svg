  <path d="M220 230 Q300 250 380 230 Q300 210 220 230" fill="#fff" stroke="#c4a882" stroke-width="2"/>

  <!-- Pikachu silhouette -->
  <ellipse cx="450" cy="280" rx="35" ry="30" fill="#ffe4c4" stroke="#c4a882" stroke-width="2"/>
