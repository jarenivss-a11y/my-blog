  <rect x="290" y="250" width="220" height="12" rx="3" fill="#e8dcc8" stroke="#8b7355" stroke-width="2"/>

  <!-- Steps/numbers -->
  <circle cx="100" cy="320" r="20" fill="#ffe4c4" stroke="#c4a882" stroke-width="2"/>
