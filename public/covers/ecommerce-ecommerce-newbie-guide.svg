  <!-- Arrow -->
  <path d="M430 320 L480 320" stroke="#c4a882" stroke-width="3" stroke-dasharray="5,3"/>
  <path d="M475 315 L485 320 L475 325" fill="none" stroke="#c4a882" stroke-width="2"/>

